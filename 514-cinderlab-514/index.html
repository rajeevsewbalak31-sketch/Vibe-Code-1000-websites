<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CinderLab — Daily Habit Tracker | Vibe Code 1000</title>
  <meta name="description" content="CinderLab tracks daily habits in your browser with streaks, progress stats, and local save — private, no account, works offline after first load." />
  <meta name="keywords" content="habit tracker, daily habits, CinderLab, productivity, Vibe Code 1000" />
  <meta name="author" content="Rajeev Sewbalak" />
  <link rel="canonical" href="https://websites-eosin-delta.vercel.app/514-cinderlab-514/" />
  <meta property="og:title" content="CinderLab — Habit Tracker" />
  <meta property="og:description" content="Build streaks with simple daily habit checkboxes." />
  <meta property="og:url" content="https://websites-eosin-delta.vercel.app/514-cinderlab-514/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/_shared/tool.css" />
  <link rel="stylesheet" href="/_shared/app.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg" aria-hidden="true"><span class="orb orb--1"></span><span class="orb orb--2"></span><span class="grain"></span></div>
  <main class="shell shell--app upgrade">
    <nav class="site-bar" aria-label="Site navigation">
      <a class="brand" href="https://websites-eosin-delta.vercel.app/"><span class="brand-mark">CL</span><span class="brand-text">CinderLab</span></a>
      <a class="btn btn--ghost btn--sm" href="https://websites-eosin-delta.vercel.app/">← Hub</a>
    </nav>
    <header class="tool-header tool-header--compact">
      <p class="eyebrow">Lab #514</p>
      <h1 class="logo">CinderLab</h1>
      <p class="tagline">Small habits, tracked daily — your data stays on this device.</p>
    </header>
    <section class="app-stage" aria-label="Habit tracker">
      <div class="app-panel habit-panel">
        <p class="habit-stats">Today: <strong id="done-today">0</strong>/<strong id="total">0</strong> · Streak: <strong id="streak">0</strong> days</p>
        <div class="habit-add">
          <input type="text" id="habit" class="input" placeholder="e.g. Drink water, Read 10 pages" maxlength="80" />
          <button type="button" id="add" class="btn btn--primary">Add habit</button>
        </div>
        <ul id="list" class="habit-list"></ul>
      </div>
    </section>
    <footer class="tip-jar"><p class="hub-wrap"><a class="hub-link" href="https://websites-eosin-delta.vercel.app/">Hub</a></p></footer>
  </main>
  <p id="toast" class="toast" role="status"></p>
  <script src="script.js"></script>
</body>
</html>
