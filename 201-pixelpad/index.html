<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelPad — CSS Gradient Builder | Vibe Code 1000</title>
  <meta name="description" content="PixelPad builds linear and radial CSS gradients with live preview, preset palettes, and one-click copy — perfect for designers and developers." />
  <meta name="keywords" content="CSS gradient generator, PixelPad, linear gradient, web design, Vibe Code 1000" />
  <meta name="author" content="Rajeev Sewbalak" />
  <link rel="canonical" href="https://websites-eosin-delta.vercel.app/201-pixelpad/" />
  <meta property="og:title" content="PixelPad — CSS Gradient Builder" />
  <meta property="og:description" content="Live gradient preview with copy-ready CSS." />
  <meta property="og:url" content="https://websites-eosin-delta.vercel.app/201-pixelpad/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/_shared/tool.css" />
  <link rel="stylesheet" href="/_shared/app.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg" aria-hidden="true"><span class="orb orb--1"></span><span class="orb orb--2"></span><span class="grain"></span></div>
  <main class="shell shell--app upgrade">
    <nav class="site-bar" aria-label="Site navigation">
      <a class="brand" href="https://websites-eosin-delta.vercel.app/"><span class="brand-mark">PP</span><span class="brand-text">PixelPad</span></a>
      <a class="btn btn--ghost btn--sm" href="https://websites-eosin-delta.vercel.app/">← Hub</a>
    </nav>
    <header class="tool-header tool-header--compact">
      <p class="eyebrow">App #201</p>
      <h1 class="logo">PixelPad</h1>
      <p class="tagline">Design gradients visually — copy production-ready CSS in one click.</p>
    </header>
    <section class="app-stage" aria-label="Gradient builder">
      <div class="app-panel grad-panel">
        <div class="preset-row" id="presets" role="group" aria-label="Presets"></div>
        <div class="form-grid">
          <label class="field-label">Color A <input type="color" id="c1" value="#6c5ce7" class="input" /></label>
          <label class="field-label">Color B <input type="color" id="c2" value="#a29bfe" class="input" /></label>
          <label class="field-label">Angle <span id="ang-val">135</span>°
            <input type="range" id="ang" min="0" max="360" value="135" class="input" />
          </label>
          <label class="field-label">Type
            <select id="type" class="input">
              <option value="linear">Linear</option>
              <option value="radial">Radial</option>
            </select>
          </label>
        </div>
        <div id="prev" class="app-preview grad-preview" aria-hidden="true"></div>
        <pre id="out" class="code-out"></pre>
        <div class="actions">
          <button type="button" id="copy" class="btn btn--primary">Copy CSS</button>
          <button type="button" id="random" class="btn btn--ghost">Randomize</button>
        </div>
      </div>
    </section>
    <footer class="tip-jar"><p class="hub-wrap"><a class="hub-link" href="https://websites-eosin-delta.vercel.app/">Hub</a></p></footer>
  </main>
  <p id="toast" class="toast" role="status"></p>
  <script src="script.js"></script>
</body>
</html>
