name: Sponsor inquiry
description: Reserve a sponsor slot on the Vibe Code 1000 hub
title: "[Sponsor] "
labels: ["sponsor"]
body:
  - type: input
    id: company
    attributes:
      label: Brand / name
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Website URL
  - type: dropdown
    id: slot
    attributes:
      label: Slot interest
      options:
        - Hub sponsor strip (€25+/week)
        - Featured tool of the week
        - Custom package
    validations:
      required: true
  - type: textarea
    id: message
    attributes:
      label: Message
      description: Audience, goals, timeline
