<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A beautiful random quote generator — discover wisdom one click at a time." />
  <title>Quotely — Random Quote Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg" aria-hidden="true">
    <span class="orb orb--1"></span>
    <span class="orb orb--2"></span>
    <span class="orb orb--3"></span>
    <span class="grain"></span>
  </div>

  <main class="page">
    <header class="header">
      <p class="eyebrow">Website #002</p>
      <h1 class="logo">Quotely</h1>
      <p class="tagline">Wisdom, randomly served</p>
    </header>

    <article class="card" aria-live="polite">
      <span class="quote-mark" aria-hidden="true">“</span>
      <blockquote>
        <p id="quote-text" class="quote-text">Loading your first quote…</p>
        <footer>
          <cite id="quote-author" class="quote-author"></cite>
        </footer>
      </blockquote>
      <p id="quote-category" class="category"></p>
    </article>

    <div class="actions">
      <button type="button" id="btn-new" class="btn btn--primary">
        <span class="btn-icon" aria-hidden="true">↻</span>
        New quote
      </button>
      <button type="button" id="btn-copy" class="btn btn--ghost" title="Copy quote">
        <span class="btn-icon" aria-hidden="true">⎘</span>
        Copy
      </button>
    </div>

    <p class="hint">Press <kbd>Space</kbd> for a new quote</p>

    <p id="toast" class="toast" role="status" aria-live="polite"></p>

    <footer class="tip-jar" style="margin-top:2rem;text-align:center;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.1);width:100%">
      <p style="font-size:.85rem;color:rgba(244,240,234,.55);margin-bottom:.5rem">Enjoying Quotely? Support the 1000 Websites Challenge</p>
      <a href="https://paypal.me/RajeevSewbalak" target="_blank" rel="noopener noreferrer" style="display:inline-block;padding:.55rem 1.1rem;font-weight:600;color:#fff;background:linear-gradient(135deg,#0070ba,#003087);border-radius:999px;text-decoration:none">Tip via PayPal</a>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
