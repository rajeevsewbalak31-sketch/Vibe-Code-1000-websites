<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusTomato — Pomodoro Timer | Vibe Code 1000</title>
  <meta name="description" content="FocusTomato is a beautiful Pomodoro timer with focus, short break, and long break presets, session tracking, and optional sound when time is up." />
  <meta name="keywords" content="pomodoro timer, focus timer, FocusTomato, productivity, Vibe Code 1000" />
  <meta name="author" content="Rajeev Sewbalak" />
  <link rel="canonical" href="https://websites-eosin-delta.vercel.app/009-pomodoro/" />
  <meta property="og:title" content="FocusTomato — Pomodoro Timer" />
  <meta property="og:description" content="25-minute focus sessions with breaks — track completed pomodoros." />
  <meta property="og:url" content="https://websites-eosin-delta.vercel.app/009-pomodoro/" />
  <meta property="og:site_name" content="Vibe Code 1000" />
  <meta name="twitter:card" content="summary" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/_shared/tool.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg" aria-hidden="true"><span class="orb orb--1"></span><span class="orb orb--2"></span><span class="grain"></span></div>
  <main class="shell upgrade">
    <nav class="site-bar" aria-label="Site navigation">
      <a class="brand" href="https://websites-eosin-delta.vercel.app/"><span class="brand-mark">FT</span><span class="brand-text">FocusTomato</span></a>
      <a class="btn btn--ghost btn--sm" href="https://websites-eosin-delta.vercel.app/">← Hub</a>
    </nav>
    <header class="tool-header">
      <p class="eyebrow">Website #009</p>
      <h1 class="logo">FocusTomato</h1>
      <p class="tagline">Deep work in timed bursts — focus, break, repeat.</p>
    </header>
    <article class="card timer-card" data-mode="focus">
      <div class="timer-ring" aria-hidden="true"><svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="54" class="ring-bg"/><circle cx="60" cy="60" r="54" class="ring-fg" id="ring-fg"/></svg></div>
      <p id="display" class="timer-display" aria-live="polite">25:00</p>
      <p id="mode-label" class="mode-label">Focus session</p>
      <div class="preset-row" role="group" aria-label="Timer presets">
        <button type="button" class="preset is-active" data-secs="1500" data-mode="focus">Focus 25</button>
        <button type="button" class="preset" data-secs="300" data-mode="short">Break 5</button>
        <button type="button" class="preset" data-secs="900" data-mode="long">Break 15</button>
      </div>
      <p class="stats">Completed today: <strong id="sessions">0</strong> focus sessions</p>
      <label class="sound-toggle"><input type="checkbox" id="sound" checked /> Chime when finished</label>
      <div class="actions">
        <button type="button" id="btn-action" class="btn btn--primary">Start</button>
        <button type="button" id="btn-reset" class="btn btn--ghost">Reset</button>
      </div>
    </article>
    <footer class="tip-jar"><p class="hub-wrap"><a class="hub-link" href="https://websites-eosin-delta.vercel.app/">Vibe Code 1000</a></p></footer>
  </main>
  <p id="toast" class="toast" role="status"></p>
  <script src="script.js"></script>
</body>
</html>
