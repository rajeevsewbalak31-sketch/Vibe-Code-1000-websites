<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlotView — QR Code Generator | Vibe Code 1000</title>
  <meta name="description" content="PlotView turns any URL or text into a downloadable QR code PNG. Live preview, error correction, and instant regenerate — free in your browser." />
  <meta name="keywords" content="QR code generator, PlotView, download QR PNG, Vibe Code 1000" />
  <meta name="author" content="Rajeev Sewbalak" />
  <link rel="canonical" href="https://vibecode1000.com/315-plotview-315/" />
  <meta property="og:title" content="PlotView — QR Code Generator" />
  <meta property="og:description" content="Create and download QR codes from any link or text." />
  <meta property="og:url" content="https://vibecode1000.com/315-plotview-315/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/_shared/tool.css" />
  <link rel="stylesheet" href="/_shared/app.css" />
  <link rel="stylesheet" href="/315-plotview-315/style.css" />
  <!-- VERCEL_ANALYTICS_START -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_shared/vercel-outbound.js"></script>
  <!-- VERCEL_ANALYTICS_END -->
</head>
<body>
  <div class="bg" aria-hidden="true"><span class="orb orb--1"></span><span class="orb orb--2"></span><span class="grain"></span></div>
  <main class="shell shell--app upgrade">
    <nav class="site-bar" aria-label="Site navigation">
      <a class="brand" href="https://vibecode1000.com/"><span class="brand-mark">QR</span><span class="brand-text">PlotView</span></a>
      <a class="btn btn--ghost btn--sm" href="https://vibecode1000.com/">← Hub</a>
    </nav>
    <header class="tool-header tool-header--compact">
      <p class="eyebrow">App #315</p>
      <h1 class="logo">PlotView</h1>
      <p class="tagline">Turn links and text into crisp QR codes — preview live, download PNG.</p>
    </header>
    <section class="app-stage" aria-label="QR generator">
      <div class="app-panel qr-panel">
        <label class="field-label">Content
          <textarea id="in" class="textarea" rows="3">https://vibecode1000.com</textarea>
        </label>
        <label class="field-label">Size
          <input type="range" id="size" min="128" max="400" value="240" class="input" />
        </label>
        <canvas id="qr" class="qr-canvas" width="240" height="240" aria-label="QR preview"></canvas>
        <div class="actions">
          <button type="button" id="btn" class="btn btn--primary">Generate</button>
          <button type="button" id="dl" class="btn btn--ghost" disabled>Download PNG</button>
        </div>
        <p class="qr-hint" id="status">Ready</p>
      </div>
    </section>
    <footer class="tip-jar"><p class="hub-wrap"><a class="hub-link" href="https://vibecode1000.com/">Hub</a></p></footer>
  </main>
  <p id="toast" class="toast" role="status"></p>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js" defer></script>
  <script src="/315-plotview-315/script.js" defer></script>
</body>
</html>
