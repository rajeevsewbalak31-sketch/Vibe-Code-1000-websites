        }

        nav {

            color: #667eea;
            padding: 1rem 2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.3s;
        }

        .cta-button:hover {
            transform: translateY(-3px);
        }

        .content {
            max-width: 1000px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .content h2 {
            color: #667eea;

            background: #1a1a1a;
            color: white;
            padding: 2rem;
